# Tiny Tapeout project information
project:
  title:        "Tiny Binary NPU"      # Project title
  author:       "jasonwaseq"      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Two-layer serial binary MLP with 8 hidden neurons, 4 output heads, and debug hidden-state pins"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     10000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_tiny_npu"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "feature_bit_0"
  ui[1]: "feature_bit_1"
  ui[2]: "feature_bit_2"
  ui[3]: "feature_bit_3"
  ui[4]: "feature_bit_4"
  ui[5]: "feature_bit_5"
  ui[6]: "feature_bit_6"
  ui[7]: "feature_bit_7"

  # Outputs
  uo[0]: "class_bit_0"
  uo[1]: "class_bit_1"
  uo[2]: "valid"
  uo[3]: "busy"
  uo[4]: "confidence_bit_0"
  uo[5]: "confidence_bit_1"
  uo[6]: "confidence_bit_2"
  uo[7]: "confidence_bit_3"

  # Bidirectional pins
  uio[0]: "start"
  uio[1]: "hidden_bit_0"
  uio[2]: "hidden_bit_1"
  uio[3]: "hidden_bit_2"
  uio[4]: "hidden_bit_3"
  uio[5]: "hidden_bit_4"
  uio[6]: "hidden_bit_5"
  uio[7]: "hidden_bit_6"

# Do not change!
yaml_version: 6
